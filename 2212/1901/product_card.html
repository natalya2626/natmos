<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            margin: 0; 
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 300px;
            text-align: center;
            padding: 20px;                      
        }
        
        .product-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .product-card h2 {
            font-size: 1.5rem;
            margin: 15px 0;
        }

        .product-card p {
            font-size: 1rem;
            color: #555;
        }

        .price {
            color: #e74c3c;
            font-size: 1.2rem;
            margin-top: 10px;
        }
    </style>
    </head>
    <body>
        <div class="product-card">
        <img src="you-and-me.jpg" alt="Картина 'Ты и Я' от игумении Елисаветы">                 
          <h2>Картина "Ты и Я"</h2>
          <p>Картинная галерея игумении Елисаветы</p>
          <div class="price">1000&nbsp;₽</div>
        </div>    
</body>
</html>
