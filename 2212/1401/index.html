<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица оценок студентов</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left; /* ← ВСЕ ячейки — по левому краю */
        }
       
        th {
            background-color:  #f2f2f2;
        }
    </style>
</head>
<body>  
    <table class="table">

                <th>Специализация</th>

                <th>Оценка за курс</th>
            </tr>
        <tbody>
            <tr> 
                <td>Иванова Милена Вячеславовна</td>    
                <td>Математика</td>
                <td>Python</td>
                <td>Отлично</td>
            </tr>
            <tr>    
                <td>Новиков Максим Андреевич</td>
                <td>Физика</td>
                <td>С++</td>
                <td>Удовлетворительно</td>
            </tr>
            <tr>
                <td>Сидоров Виктор Павлович</td>
                <td>Программирование</td>
                <td>Java</td>
                <td>Отлично</td>
            </tr>
            <tr>
                <td>Сударева Полина Викторовна</td>

                <td>JavaScript</td>

            </tr>    
        <tbody>
    </table> 
</body>
</html>
